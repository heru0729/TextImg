<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f0f;--panel:#1a1a1a;--border:#2e2e2e;--text:#e8e8e8;--muted:#888;--accent:#d4ff00;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;min-height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:12px}
header h1{font-family:'Dela Gothic One',cursive;font-size:18px;letter-spacing:.05em;color:var(--accent)}
header span{color:var(--muted);font-size:11px}
.lang-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px}
.section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}
textarea{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px;resize:vertical;min-height:80px;outline:none;transition:border-color .2s}
textarea:focus{border-color:var(--accent)}
select,input[type="number"],input[type="text"]{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:7px 10px;outline:none;transition:border-color .2s;appearance:none}
select:focus,input[type="number"]:focus{border-color:var(--accent)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.color-row{display:flex;align-items:center;gap:8px}
.color-swatch{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.color-swatch input[type="color"]{opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer;padding:0;border:none}
.color-hex{flex:1;font-family:'Courier New',monospace;font-size:12px}
.align-group{display:flex;gap:4px}
.align-btn{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:7px;cursor:pointer;font-size:14px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.align-btn:hover{border-color:var(--accent);color:var(--accent)}
.align-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.format-group{display:flex;gap:4px}
.format-btn{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:6px;cursor:pointer;font-size:12px;font-weight:700;transition:all .15s}
.format-btn:hover{border-color:var(--accent);color:var(--accent)}
.format-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.preset-btn{background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:5px 4px;cursor:pointer;font-size:10px;text-align:center;transition:all .15s;line-height:1.3}
.preset-btn:hover{border-color:var(--accent);color:var(--accent)}
.dl-row{display:flex;gap:8px;align-items:center}
.dl-btn{flex:1;background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s}
.dl-btn:hover{opacity:.85}
input[type="range"]{width:100%;accent-color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border)}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0}
.check-row input[type="checkbox"]{width:auto;padding:0;accent-color:var(--accent)}
.fx-accordion{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:4px}
.fx-accordion-header{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;cursor:pointer;user-select:none;transition:background .15s}
.fx-accordion-header:hover{background:var(--panel)}
.fx-accordion-header.active{background:rgba(212,255,0,.08);border-bottom:1px solid var(--border)}
.fx-accordion-left{display:flex;align-items:center;gap:8px}
.fx-accordion-left input[type="checkbox"]{width:auto;padding:0;accent-color:var(--accent);flex-shrink:0}
.fx-accordion-title{font-size:12px;color:var(--text)}
.fx-accordion-arrow{font-size:10px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.fx-accordion-header.active .fx-accordion-arrow{transform:rotate(180deg)}
.fx-accordion-body{display:none;padding:10px;flex-direction:column;gap:8px;background:var(--panel)}
.fx-accordion-body.open{display:flex}
.autosave-indicator{font-size:10px;color:var(--muted);text-align:right;padding:2px 0;transition:color .3s}
.autosave-indicator.saved{color:var(--accent)}
.preview-area{flex:1;overflow:hidden;position:relative;background:repeating-conic-gradient(#1c1c1c 0% 25%,#181818 0% 50%) 0 0/20px 20px;user-select:none;touch-action:none}
.canvas-wrapper{position:absolute;transform-origin:center center;box-shadow:0 8px 40px rgba(0,0,0,.6)}
canvas{display:block;cursor:crosshair}
canvas.grabbing{cursor:grabbing}
.zoom-hud{position:absolute;bottom:16px;right:16px;display:flex;align-items:center;gap:8px;background:rgba(26,26,26,.92);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-family:'Courier New',monospace;color:var(--muted);backdrop-filter:blur(8px);pointer-events:auto}
.zoom-hud button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;transition:color .15s}
.zoom-hud button:hover{color:var(--accent)}
#zoomLabel{color:var(--text);min-width:42px;text-align:center}
.size-indicator{position:absolute;bottom:16px;left:16px;color:var(--muted);font-size:11px;font-family:'Courier New',monospace;background:rgba(26,26,26,.8);border:1px solid var(--border);border-radius:12px;padding:4px 10px}
.pos-indicator{position:absolute;top:16px;right:16px;color:var(--muted);font-size:11px;font-family:'Courier New',monospace;background:rgba(26,26,26,.8);border:1px solid var(--border);border-radius:12px;padding:4px 10px;display:none}
.hint{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);background:rgba(26,26,26,.7);border:1px solid var(--border);border-radius:10px;padding:3px 10px;white-space:nowrap;pointer-events:none;opacity:1;transition:opacity 1s}
.hint.hidden{opacity:0}
</style>
</head>
<body>
<header>
  <div class="header-left"><h1>TextImg</h1><span id="headerSub">Text Image Generator</span></div>
  <button class="lang-btn" id="langBtn">日本語</button>
</header>
<div class="main">
  <aside class="sidebar">
    <div>
      <div class="section-label" id="secText">Text</div>
      <label id="labelInput">Input</label>
      <textarea id="textInput" placeholder="Enter text here..."></textarea>
    </div>
    <div>
      <div class="section-label" id="secFont">Font</div>
      <label id="labelFontFamily">Font family</label>
      <select id="fontFamily"></select>
      <div style="margin-top:8px">
        <label><span id="labelFontSize">Size</span> <span id="fontSizeVal">64</span>px</label>
        <input type="range" id="fontSize" min="8" max="300" value="64">
      </div>
      <div style="margin-top:8px">
        <label><span id="labelLineHeight">Line height</span> <span id="lineHeightVal">1.4</span></label>
        <input type="range" id="lineHeight" min="0.8" max="3.0" step="0.1" value="1.4">
      </div>
      <div style="margin-top:8px" class="format-group">
        <button class="format-btn" id="boldBtn" onclick="toggleBold()"><b>B</b></button>
        <button class="format-btn" id="italicBtn" onclick="toggleItalic()"><i>I</i></button>
      </div>
    </div>
    <div>
      <div class="section-label" id="secAlign">Alignment</div>
      <label id="labelHAlign">Horizontal</label>
      <div class="align-group">
        <button class="align-btn active" data-align="left" onclick="setAlign('left')">&#9776;</button>
        <button class="align-btn" data-align="center" onclick="setAlign('center')">&#8801;</button>
        <button class="align-btn" data-align="right" onclick="setAlign('right')">&#9776;</button>
      </div>
      <div style="margin-top:8px">
        <label id="labelVAlign">Vertical</label>
        <div class="align-group">
          <button class="align-btn active" data-valign="top" onclick="setVAlign('top')">↑</button>
          <button class="align-btn" data-valign="middle" onclick="setVAlign('middle')">↕</button>
          <button class="align-btn" data-valign="bottom" onclick="setVAlign('bottom')">↓</button>
        </div>
      </div>
      <div style="margin-top:8px">
        <label id="labelPosition">Custom position (px)</label>
        <div class="row2">
          <div><label>X</label><input type="number" id="posX" value="0" min="-9999" max="9999"></div>
          <div><label>Y</label><input type="number" id="posY" value="0" min="-9999" max="9999"></div>
        </div>
        <div style="margin-top:4px">
          <label class="check-row"><input type="checkbox" id="customPosCheck"><span id="labelCustomPos">Enable drag position</span></label>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label" id="secColor">Color</div>
      <label id="labelBgColor">Background</label>
      <div class="color-row">
        <div class="color-swatch" id="bgSwatch" style="background:#ffffff"><input type="color" id="bgColor" value="#ffffff"></div>
        <input type="text" class="color-hex" id="bgHex" value="#ffffff" maxlength="7">
      </div>
      <div style="margin-top:8px">
        <label id="labelFgColor">Text color</label>
        <div class="color-row">
          <div class="color-swatch" id="fgSwatch" style="background:#000000"><input type="color" id="fgColor" value="#000000"></div>
          <input type="text" class="color-hex" id="fgHex" value="#000000" maxlength="7">
        </div>
      </div>
      <div style="margin-top:12px"><label class="check-row"><input type="checkbox" id="perCharCheck"><span id="labelPerChar">Per-character color</span></label></div>
      <div id="perCharPanel" style="display:none;margin-top:8px"><div id="perCharList" style="display:flex;flex-wrap:wrap;gap:6px"></div></div>
      <div style="margin-top:10px"><label class="check-row"><input type="checkbox" id="gamingCheck"><span id="labelGaming">Gaming Text 🌈</span></label></div>
    </div>
    <div>
      <div class="section-label" id="secEffects">Effects</div>
      <div class="fx-accordion" id="acc-pixel">
        <div class="fx-accordion-header" onclick="toggleAcc('pixel')">
          <div class="fx-accordion-left"><input type="checkbox" id="pixelCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelPixel">Pixel Mode</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-pixel">
          <label><span id="labelPixelSize">Pixel size</span> <span id="pixelSizeVal">8</span>px</label>
          <input type="range" id="pixelSize" min="2" max="32" value="8">
        </div>
      </div>
      <div class="fx-accordion" id="acc-outline">
        <div class="fx-accordion-header" onclick="toggleAcc('outline')">
          <div class="fx-accordion-left"><input type="checkbox" id="outlineCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelOutline">Outline</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-outline">
          <label><span id="labelOutlineWidth">Width</span> <span id="outlineWidthVal">3</span>px</label>
          <input type="range" id="outlineWidth" min="1" max="20" value="3">
          <label id="labelOutlineColor">Color</label>
          <div class="color-row">
            <div class="color-swatch" id="outlineSwatch" style="background:#ffffff"><input type="color" id="outlineColor" value="#ffffff"></div>
            <input type="text" class="color-hex" id="outlineHex" value="#ffffff" maxlength="7">
          </div>
        </div>
      </div>
      <div class="fx-accordion" id="acc-shadow">
        <div class="fx-accordion-header" onclick="toggleAcc('shadow')">
          <div class="fx-accordion-left"><input type="checkbox" id="shadowCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelShadow">Shadow</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-shadow">
          <label><span id="labelShadowBlur">Blur</span> <span id="shadowBlurVal">10</span>px</label>
          <input type="range" id="shadowBlur" min="0" max="40" value="10">
          <div class="row2">
            <div><label>X offset</label><input type="number" id="shadowX" value="4" min="-50" max="50"></div>
            <div><label>Y offset</label><input type="number" id="shadowY" value="4" min="-50" max="50"></div>
          </div>
          <label id="labelShadowColor">Color</label>
          <div class="color-row">
            <div class="color-swatch" id="shadowSwatch" style="background:#000000"><input type="color" id="shadowColor" value="#000000"></div>
            <input type="text" class="color-hex" id="shadowHex" value="#000000" maxlength="7">
          </div>
        </div>
      </div>
      <div class="fx-accordion" id="acc-glitch">
        <div class="fx-accordion-header" onclick="toggleAcc('glitch')">
          <div class="fx-accordion-left"><input type="checkbox" id="glitchCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelGlitch">Glitch</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-glitch">
          <label><span id="labelGlitchAmount">Amount</span> <span id="glitchAmountVal">8</span></label>
          <input type="range" id="glitchAmount" min="1" max="30" value="8">
        </div>
      </div>
      <div class="fx-accordion" id="acc-gradText">
        <div class="fx-accordion-header" onclick="toggleAcc('gradText')">
          <div class="fx-accordion-left"><input type="checkbox" id="gradTextCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelGradText">Gradient Text</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-gradText">
          <label id="labelGradColor1">Color 1</label>
          <div class="color-row">
            <div class="color-swatch" id="gradColor1Swatch" style="background:#ff0080"><input type="color" id="gradColor1" value="#ff0080"></div>
            <input type="text" class="color-hex" id="gradColor1Hex" value="#ff0080" maxlength="7">
          </div>
          <label id="labelGradColor2">Color 2</label>
          <div class="color-row">
            <div class="color-swatch" id="gradColor2Swatch" style="background:#0080ff"><input type="color" id="gradColor2" value="#0080ff"></div>
            <input type="text" class="color-hex" id="gradColor2Hex" value="#0080ff" maxlength="7">
          </div>
          <label id="labelGradDir">Direction</label>
          <select id="gradDir">
            <option value="h" id="optH">Horizontal</option>
            <option value="v" id="optV">Vertical</option>
            <option value="d" id="optD">Diagonal</option>
          </select>
        </div>
      </div>
      <div class="fx-accordion" id="acc-neon">
        <div class="fx-accordion-header" onclick="toggleAcc('neon')">
          <div class="fx-accordion-left"><input type="checkbox" id="neonCheck" onclick="event.stopPropagation()"><span class="fx-accordion-title" id="labelNeon">Neon</span></div>
          <span class="fx-accordion-arrow">▼</span>
        </div>
        <div class="fx-accordion-body" id="body-neon">
          <label><span id="labelNeonBlur">Glow size</span> <span id="neonBlurVal">15</span>px</label>
          <input type="range" id="neonBlur" min="5" max="50" value="15">
          <label id="labelNeonColor">Glow color</label>
          <div class="color-row">
            <div class="color-swatch" id="neonSwatch" style="background:#00ffff"><input type="color" id="neonColor" value="#00ffff"></div>
            <input type="text" class="color-hex" id="neonHex" value="#00ffff" maxlength="7">
          </div>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label" id="secPadding">Padding</div>
      <label><span id="labelPadding">Padding</span> <span id="paddingVal">40</span>px</label>
      <input type="range" id="padding" min="0" max="200" value="40">
    </div>
    <div>
      <div class="section-label" id="secSize">Image size</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="setPreset(800,600)">800×600<br><span style="color:#666" id="presetGeneral">General</span></button>
        <button class="preset-btn" onclick="setPreset(1200,630)">1200×630<br><span style="color:#666">OGP</span></button>
        <button class="preset-btn" onclick="setPreset(1080,1080)">1080×1080<br><span style="color:#666" id="presetSquare">Square</span></button>
        <button class="preset-btn" onclick="setPreset(1920,1080)">1920×1080<br><span style="color:#666">FHD</span></button>
        <button class="preset-btn" onclick="setPreset(1080,1920)">1080×1920<br><span style="color:#666" id="presetPortrait">Portrait</span></button>
        <button class="preset-btn" onclick="setPreset(1500,500)">1500×500<br><span style="color:#666" id="presetWide">Wide</span></button>
      </div>
      <div class="row2" style="margin-top:8px">
        <div><label id="labelWidth">Width (px)</label><input type="number" id="imgWidth" value="800" min="1" max="4000"></div>
        <div><label id="labelHeight">Height (px)</label><input type="number" id="imgHeight" value="600" min="1" max="4000"></div>
      </div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label" id="secDownload">Download</div>
      <div class="dl-row">
        <select id="dlFormat" style="width:90px"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
        <button class="dl-btn" onclick="download()" id="btnSave">⬇ Save</button>
      </div>
      <div class="autosave-indicator" id="autosaveIndicator">Auto-save: idle</div>
    </div>
  </aside>
  <div class="preview-area" id="previewArea">
    <div class="canvas-wrapper" id="canvasWrapper"><canvas id="canvas"></canvas></div>
    <div class="size-indicator" id="sizeIndicator">800 × 600 px</div>
    <div class="pos-indicator" id="posIndicator">X:0 Y:0</div>
    <div class="zoom-hud">
      <button onclick="zoomStep(-1)">−</button>
      <span id="zoomLabel">100%</span>
      <button onclick="zoomStep(1)">＋</button>
      <button onclick="resetZoom()">⌖</button>
    </div>
    <div class="hint" id="hint">Wheel/Pinch=zoom　Drag=pan</div>
  </div>
</div>
<script>
// ---- i18n ----
const I18N = {
  en: {
    headerSub:'Text Image Generator', secText:'Text', labelInput:'Input',
    secFont:'Font', labelFontFamily:'Font family', labelFontSize:'Size', labelLineHeight:'Line height',
    secAlign:'Alignment', labelHAlign:'Horizontal', labelVAlign:'Vertical',
    labelPosition:'Custom position (px)', labelCustomPos:'Enable drag position',
    secColor:'Color', labelBgColor:'Background', labelFgColor:'Text color',

    secEffects:'Effects', labelPixel:'Pixel Mode', labelPixelSize:'Pixel size',

    labelShadow:'Shadow', labelShadowBlur:'Blur', labelShadowColor:'Color',
    labelGlitch:'Glitch', labelGlitchAmount:'Amount',

    optH:'Horizontal', optV:'Vertical', optD:'Diagonal',
    labelNeon:'Neon', labelNeonBlur:'Glow size', labelNeonColor:'Glow color',
    secPadding:'Padding', labelPadding:'Padding',
    secSize:'Image size', labelWidth:'Width (px)', labelHeight:'Height (px)',
    presetGeneral:'General', presetSquare:'Square', presetPortrait:'Portrait', presetWide:'Wide',
    secDownload:'Download', btnSave:'⬇ Save',

    autosaveIdle:'Auto-save: idle', autosaveSaved:'✓ Saved',
  },
  ja: {

// ---- zoom/pan ----
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvasWrapper');
const previewArea = document.getElementById('previewArea');
let zoom=1, panX=0, panY=0;
const MIN_ZOOM=0.05, MAX_ZOOM=10;
setTimeout(()=>document.getElementById('hint').classList.add('hidden'), 5000);

function applyTransform(){
  const r = previewArea.getBoundingClientRect();
  wrapper.style.left = r.width/2 + panX + 'px';
  wrapper.style.top  = r.height/2 + panY + 'px';
  wrapper.style.transform = `translate(-50%,-50%) scale(${zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoom*100) + '%';
}
function clampZoom(z){ return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, z)); }
function resetZoom(){ zoom=1; panX=0; panY=0; applyTransform(); }
function zoomStep(dir){
  const s=[0.1,0.15,0.25,0.33,0.5,0.67,0.75,1,1.25,1.5,2,2.5,3,4,5,6,8,10];
  if(dir>0){ const n=s.find(v=>v>zoom+0.001); zoom=n||MAX_ZOOM; }
  else      { const n=[...s].reverse().find(v=>v<zoom-0.001); zoom=n||MIN_ZOOM; }
  applyTransform();
}
previewArea.addEventListener('wheel', e=>{
  e.preventDefault();
  const r=previewArea.getBoundingClientRect();
  const mx=e.clientX-r.left-r.width/2, my=e.clientY-r.top-r.height/2;
  const f=e.deltaY<0?1.1:1/1.1, nz=clampZoom(zoom*f), sc=nz/zoom;
  panX=mx+(panX-mx)*sc; panY=my+(panY-my)*sc; zoom=nz; applyTransform();
},{passive:false});

// drag
let dragMode=null, dsx=0, dsy=0, dpx=0, dpy=0, dtx=0, dty=0;
function canvasCoord(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)/zoom, y:(e.clientY-r.top)/zoom}; }
function isOverText(cx,cy){
  if(!state.customPos) return false;
  ctx.font=`${state.italic?'italic':'normal'} ${state.bold?'bold':'normal'} ${state.fontSize}px ${actualFont(state.fontFamily)}`;
  const lines=state.text.split('\n'), lineH=state.fontSize*state.lineHeight;
  const totalH=lines.length*lineH;
  const maxW=lines.reduce((m,l)=>Math.max(m,ctx.measureText(l).width),0);
  return cx>=state.textX && cx<=state.textX+maxW && cy>=state.textY && cy<=state.textY+totalH;
}
canvas.addEventListener('mousedown', e=>{
  if(e.button!==0) return;
  const c=canvasCoord(e);
  if(state.customPos && isOverText(c.x,c.y)){
    dragMode='text'; dtx=c.x-state.textX; dty=c.y-state.textY; canvas.classList.add('grabbing');
  } else {
    dragMode='pan'; dsx=e.clientX; dsy=e.clientY; dpx=panX; dpy=panY; previewArea.style.cursor='grabbing';
  }
});
window.addEventListener('mousemove', e=>{
  if(!dragMode) return;
  if(dragMode==='pan'){ panX=dpx+(e.clientX-dsx); panY=dpy+(e.clientY-dsy); applyTransform(); }
  else if(dragMode==='text'){
    const c=canvasCoord(e);
    state.textX=Math.round(c.x-dtx); state.textY=Math.round(c.y-dty);
    document.getElementById('posX').value=state.textX;
    document.getElementById('posY').value=state.textY;
    document.getElementById('posIndicator').textContent=`X:${state.textX} Y:${state.textY}`;
    render();
  }
});
window.addEventListener('mouseup', ()=>{ dragMode=null; canvas.classList.remove('grabbing'); previewArea.style.cursor=''; });

let lt=null;
previewArea.addEventListener('touchstart', e=>{e.preventDefault(); lt=[...e.touches];},{passive:false});
previewArea.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=[...e.touches], r=previewArea.getBoundingClientRect(), cx=r.width/2, cy=r.height/2;
  if(t.length===1 && lt.length===1){ panX+=t[0].clientX-lt[0].clientX; panY+=t[0].clientY-lt[0].clientY; }
  else if(t.length===2 && lt.length===2){
    const pd=Math.hypot(lt[1].clientX-lt[0].clientX,lt[1].clientY-lt[0].clientY);
    const cd=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
    const mx=(t[0].clientX+t[1].clientX)/2-r.left-cx, my=(t[0].clientY+t[1].clientY)/2-r.top-cy;
    const nz=clampZoom(zoom*cd/pd), sc=nz/zoom;
    panX=mx+(panX-mx)*sc; panY=my+(panY-my)*sc; zoom=nz;
    panX+=(t[0].clientX+t[1].clientX)/2-(lt[0].clientX+lt[1].clientX)/2;
    panY+=(t[0].clientY+t[1].clientY)/2-(lt[0].clientY+lt[1].clientY)/2;
  }
  lt=t; applyTransform();
},{passive:false});
previewArea.addEventListener('touchend', e=>{ lt=[...e.touches]; },{passive:false});

// ---- render ----
function actualFont(f){ return f==='__8bit__' ? 'monospace' : f; }
function gamingColor(i,total){ return `hsl(${Math.round(i/Math.max(total,1)*360)},100%,55%)`; }

function render(){
  const W=state.width, H=state.height;
  canvas.width=W; canvas.height=H;

  const off=document.createElement('canvas'); off.width=W; off.height=H;
  const oc=off.getContext('2d');
  oc.fillStyle=state.bgColor; oc.fillRect(0,0,W,H);

  if(state.text){
    const fnt=`${state.italic?'italic':'normal'} ${state.bold?'bold':'normal'} ${state.fontSize}px ${actualFont(state.fontFamily)}`;
    oc.font=fnt; oc.textBaseline='top';
    const lines=state.text.split('\n'), lineH=state.fontSize*state.lineHeight, pad=state.padding, totalH=lines.length*lineH;
    const sy = state.customPos ? state.textY : state.valign==='top' ? pad : state.valign==='middle' ? (H-totalH)/2 : H-pad-totalH;
    const allChars=[...state.text].filter(c=>c!=='\n');
    let gi=0;
    lines.forEach((line,li)=>{
      const lw=oc.measureText(line).width;
      const lx = state.customPos ? state.textX : state.align==='left' ? pad : state.align==='center' ? (W-lw)/2 : W-pad-lw;
      const y=sy+li*lineH;
      // gradient
      let fill=state.fgColor;
      if(state.gradText && !state.perChar && !state.gaming){
        let g;
        if(state.gradDir==='h') g=oc.createLinearGradient(lx,y,lx+lw,y);
        else if(state.gradDir==='v') g=oc.createLinearGradient(lx,y,lx,y+totalH);
        else g=oc.createLinearGradient(lx,y,lx+lw,y+totalH);
        g.addColorStop(0,state.gradColor1); g.addColorStop(1,state.gradColor2); fill=g;
      }
      // neon
      if(state.neon){
        oc.save(); oc.shadowColor=state.neonColor; oc.shadowBlur=state.neonBlur;
        oc.fillStyle=state.neonColor; oc.fillText(line,lx,y);
        oc.shadowBlur=state.neonBlur*0.5; oc.fillText(line,lx,y); oc.restore();
      }
      // shadow
      if(state.shadow){ oc.shadowColor=state.shadowColor; oc.shadowBlur=state.shadowBlur; oc.shadowOffsetX=state.shadowX; oc.shadowOffsetY=state.shadowY; }
      else { oc.shadowColor='transparent'; oc.shadowBlur=0; oc.shadowOffsetX=0; oc.shadowOffsetY=0; }
      // outline
      if(state.outline){ oc.strokeStyle=state.outlineColor; oc.lineWidth=state.outlineWidth*2; oc.lineJoin='round'; oc.strokeText(line,lx,y); }
      oc.shadowColor='transparent'; oc.shadowBlur=0; oc.shadowOffsetX=0; oc.shadowOffsetY=0;
      // fill
      if(!state.perChar && !state.gaming){
        oc.fillStyle=fill; oc.fillText(line,lx,y); gi+=[...line].length;
      } else {
        let cx2=lx;
        [...line].forEach(ch=>{
          const cw=oc.measureText(ch).width;
          const color = state.gaming ? gamingColor(gi,allChars.length) : (state.charColors[gi]||state.fgColor);
          oc.fillStyle=color; oc.fillText(ch,cx2,y); cx2+=cw; gi++;
        });
      }
    });
    // glitch
    if(state.glitch){
      const amt=state.glitchAmount;
      for(let i=0;i<8;i++){
        const sy2=Math.random()*H, sh2=Math.random()*30+5, sx2=Math.random()*amt*2-amt;
        const id=oc.getImageData(0,sy2,W,sh2); oc.putImageData(id,sx2,sy2);
      }
      const id2=oc.getImageData(0,0,W,H); const d=id2.data;
      for(let i=0;i<d.length;i+=4){
        const sh=Math.floor(amt/2)*4;
        if(i+sh<d.length) d[i]=d[i+sh];
        if(i-sh>=0) d[i+2]=d[i-sh+2];
      }
      oc.putImageData(id2,0,0);
    }
  }

  // output
  if(state.pixel){
    const ps=state.pixelSize;
    const sw=Math.ceil(W/ps), sh=Math.ceil(H/ps);
    const sm=document.createElement('canvas'); sm.width=sw; sm.height=sh;
    const sc=sm.getContext('2d'); sc.imageSmoothingEnabled=false; sc.drawImage(off,0,0,sw,sh);
    ctx.imageSmoothingEnabled=false; ctx.drawImage(sm,0,0,W,H);
  } else if(state.fontFamily==='__8bit__'){
    const ps=4;
    const sw=Math.ceil(W/ps), sh=Math.ceil(H/ps);
    const sm=document.createElement('canvas'); sm.width=sw; sm.height=sh;
    const sc=sm.getContext('2d'); sc.imageSmoothingEnabled=false;
    sc.fillStyle=state.bgColor; sc.fillRect(0,0,sw,sh);
    if(state.text){
      const scaleF=1/ps; sc.save(); sc.scale(scaleF,scaleF);
      sc.font=`${state.italic?'italic':'normal'} ${state.bold?'bold':'normal'} ${state.fontSize}px monospace`;
      sc.textBaseline='top';
      const lines2=state.text.split('\n'), lh2=state.fontSize*state.lineHeight, pad2=state.padding, th2=lines2.length*lh2;
      const sy2=state.customPos?state.textY:state.valign==='top'?pad2:state.valign==='middle'?(H-th2)/2:H-pad2-th2;
      lines2.forEach((line,li)=>{
        const lw=sc.measureText(line).width;
        const lx2=state.customPos?state.textX:state.align==='left'?pad2:state.align==='center'?(W-lw)/2:W-pad2-lw;
        sc.fillStyle=state.fgColor; sc.fillText(line,lx2,sy2+li*lh2);
      });
      sc.restore();
    }
    ctx.imageSmoothingEnabled=false; ctx.drawImage(sm,0,0,W,H);
  } else {
    ctx.drawImage(off,0,0);
  }

  document.getElementById('sizeIndicator').textContent=`${W} × ${H} px`;
  applyTransform();
}

}

function buildPerCharList(){
  const list=document.getElementById('perCharList');
  const newColors={}; list.innerHTML='';
  [...state.text].forEach((c,ci)=>{
    if(c==='\n') return;
    const color=state.charColors[ci]||state.fgColor; newColors[ci]=color;
    const wrap=document.createElement('div'); wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:2px';
    const lbl=document.createElement('span'); lbl.textContent=c===' '?'·':c; lbl.style.cssText='font-size:10px;color:var(--muted);max-width:24px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    const sw=document.createElement('div'); sw.style.cssText=`width:24px;height:24px;border-radius:4px;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;background:${color}`;
    const inp=document.createElement('input'); inp.type='color'; inp.value=color; inp.style.cssText='opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer;padding:0;border:none';
    inp.addEventListener('input', e=>{ state.charColors[ci]=e.target.value; sw.style.background=e.target.value; render(); });
    sw.appendChild(inp); wrap.appendChild(lbl); wrap.appendChild(sw); list.appendChild(wrap);
  });
  state.charColors=newColors;
}

  const mime=fmt==='jpeg'?'image/jpeg':fmt==='webp'?'image/webp':'image/png';
  const a=document.createElement('a'); a.href=canvas.toDataURL(mime,.95); a.download=`textimg.${fmt}`; a.click();
}

// ---- autosave ----
const SAVE_KEY='textimg_v2';
let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(SAVE_KEY,JSON.stringify(state));
      const ind=document.getElementById('autosaveIndicator');
      ind.textContent=tl('autosaveSaved'); ind.classList.add('saved');
      setTimeout(()=>{ ind.textContent=tl('autosaveIdle'); ind.classList.remove('saved'); },2000);
    }catch(e){}
  },800);
}

function loadState(){
  try{
    const s=localStorage.getItem(SAVE_KEY); if(!s) return;
    const saved=JSON.parse(s); Object.assign(state,saved);
    document.getElementById('textInput').value=state.text;
    document.getElementById('fontSize').value=state.fontSize; document.getElementById('fontSizeVal').textContent=state.fontSize;
    document.getElementById('lineHeight').value=state.lineHeight; document.getElementById('lineHeightVal').textContent=state.lineHeight.toFixed(1);
    document.getElementById('padding').value=state.padding; document.getElementById('paddingVal').textContent=state.padding;
    document.getElementById('imgWidth').value=state.width; document.getElementById('imgHeight').value=state.height;
    document.getElementById('posX').value=state.textX; document.getElementById('posY').value=state.textY;
    document.getElementById('customPosCheck').checked=state.customPos;
    if(state.customPos) document.getElementById('posIndicator').style.display='block';
    document.getElementById('bgColor').value=state.bgColor; document.getElementById('bgHex').value=state.bgColor; document.getElementById('bgSwatch').style.background=state.bgColor;
    document.getElementById('fgColor').value=state.fgColor; document.getElementById('fgHex').value=state.fgColor; document.getElementById('fgSwatch').style.background=state.fgColor;
    document.getElementById('boldBtn').classList.toggle('active',state.bold);
    document.getElementById('italicBtn').classList.toggle('active',state.italic);
    document.querySelectorAll('[data-align]').forEach(b=>b.classList.toggle('active',b.dataset.align===state.align));
    document.querySelectorAll('[data-valign]').forEach(b=>b.classList.toggle('active',b.dataset.valign===state.valign));
    [{k:'pixel',id:'pixelCheck'},{k:'outline',id:'outlineCheck'},{k:'shadow',id:'shadowCheck'},{k:'glitch',id:'glitchCheck'},{k:'gradText',id:'gradTextCheck'},{k:'neon',id:'neonCheck'}].forEach(({k,id})=>{
      if(state[k]){
        document.getElementById(id).checked=true;
        document.getElementById(`body-${k}`)?.classList.add('open');
        document.querySelector(`#acc-${k} .fx-accordion-header`)?.classList.add('active');
      }
    });
    document.getElementById('pixelSize').value=state.pixelSize; document.getElementById('pixelSizeVal').textContent=state.pixelSize;
    document.getElementById('outlineWidth').value=state.outlineWidth; document.getElementById('outlineWidthVal').textContent=state.outlineWidth;
    document.getElementById('outlineColor').value=state.outlineColor; document.getElementById('outlineHex').value=state.outlineColor; document.getElementById('outlineSwatch').style.background=state.outlineColor;
    document.getElementById('shadowBlur').value=state.shadowBlur; document.getElementById('shadowBlurVal').textContent=state.shadowBlur;
    document.getElementById('shadowX').value=state.shadowX; document.getElementById('shadowY').value=state.shadowY;
    document.getElementById('shadowColor').value=state.shadowColor; document.getElementById('shadowHex').value=state.shadowColor; document.getElementById('shadowSwatch').style.background=state.shadowColor;
    document.getElementById('glitchAmount').value=state.glitchAmount; document.getElementById('glitchAmountVal').textContent=state.glitchAmount;
    document.getElementById('gradColor1').value=state.gradColor1; document.getElementById('gradColor1Hex').value=state.gradColor1; document.getElementById('gradColor1Swatch').style.background=state.gradColor1;
    document.getElementById('gradColor2').value=state.gradColor2; document.getElementById('gradColor2Hex').value=state.gradColor2; document.getElementById('gradColor2Swatch').style.background=state.gradColor2;
    document.getElementById('gradDir').value=state.gradDir;
    document.getElementById('neonBlur').value=state.neonBlur; document.getElementById('neonBlurVal').textContent=state.neonBlur;
    document.getElementById('neonColor').value=state.neonColor; document.getElementById('neonHex').value=state.neonColor; document.getElementById('neonSwatch').style.background=state.neonColor;
    if(state.perChar){ document.getElementById('perCharCheck').checked=true; buildPerCharList(); document.getElementById('perCharPanel').style.display='block'; }
    if(state.gaming) document.getElementById('gamingCheck').checked=true;
  }catch(e){ console.warn('loadState failed',e); }
}

// ---- init ----
loadState();
applyLang();
render();
setTimeout(()=>{
  const r=previewArea.getBoundingClientRect();
  zoom=clampZoom(Math.min((r.width-80)/state.width,(r.height-80)/state.height,1));
  applyTransform();
},100);
</script>
</body>
</html>
