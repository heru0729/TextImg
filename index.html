<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f0f0f; --panel: #1a1a1a; --border: #2e2e2e; --text: #e8e8e8; --muted: #888; --accent: #d4ff00; --radius: 8px; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-family: 'Dela Gothic One', cursive; font-size: 18px; letter-spacing: 0.05em; color: var(--accent); }
  header span { color: var(--muted); font-size: 11px; }
  .lang-btn { background: var(--panel); border: 1px solid var(--border); color: var(--muted); padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .main { display: flex; flex: 1; overflow: hidden; }
  .sidebar { width: 280px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; padding: 10px; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  select, input[type="number"], input[type="text"] { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; transition: border-color 0.2s; appearance: none; }
  select:focus, input[type="number"]:focus { border-color: var(--accent); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-swatch { width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; flex-shrink: 0; position: relative; overflow: hidden; }
  .color-swatch input[type="color"] { opacity: 0; position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; padding: 0; border: none; }
  .color-hex { flex: 1; font-family: 'Courier New', monospace; font-size: 12px; }
  .align-group { display: flex; gap: 4px; }
  .align-btn { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 7px; cursor: pointer; font-size: 14px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .align-btn:hover { border-color: var(--accent); color: var(--accent); }
  .align-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .format-group { display: flex; gap: 4px; }
  .format-btn { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 6px; cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.15s; }
  .format-btn:hover { border-color: var(--accent); color: var(--accent); }
  .format-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .preset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
  .preset-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); padding: 5px 4px; cursor: pointer; font-size: 10px; text-align: center; transition: all 0.15s; line-height: 1.3; }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .dl-row { display: flex; gap: 8px; align-items: center; }
  .dl-btn { flex: 1; background: var(--accent); color: #000; border: none; border-radius: var(--radius); padding: 10px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .dl-btn:hover { opacity: 0.85; }
  input[type="range"] { width: 100%; accent-color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); }
  .preview-area { flex: 1; overflow: hidden; position: relative; background: repeating-conic-gradient(#1c1c1c 0% 25%, #181818 0% 50%) 0 0 / 20px 20px; cursor: grab; user-select: none; touch-action: none; }
  .preview-area:active { cursor: grabbing; }
  .canvas-wrapper { position: absolute; transform-origin: center center; box-shadow: 0 8px 40px rgba(0,0,0,0.6); }
  canvas { display: block; }
  .zoom-hud { position: absolute; bottom: 16px; right: 16px; display: flex; align-items: center; gap: 8px; background: rgba(26,26,26,0.92); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-family: 'Courier New', monospace; color: var(--muted); backdrop-filter: blur(8px); pointer-events: auto; }
  .zoom-hud button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 0 2px; transition: color 0.15s; }
  .zoom-hud button:hover { color: var(--accent); }
  #zoomLabel { color: var(--text); min-width: 42px; text-align: center; }
  .size-indicator { position: absolute; bottom: 16px; left: 16px; color: var(--muted); font-size: 11px; font-family: 'Courier New', monospace; background: rgba(26,26,26,0.8); border: 1px solid var(--border); border-radius: 12px; padding: 4px 10px; }
  .hint { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); background: rgba(26,26,26,0.7); border: 1px solid var(--border); border-radius: 10px; padding: 3px 10px; white-space: nowrap; pointer-events: none; opacity: 1; transition: opacity 1s; }
  .hint.hidden { opacity: 0; }

<header>

<div class="main">

      </div>
    </div>
    <div>
      <div class="section-label" data-i18n="sec.align">Alignment</div>
      <label data-i18n="label.hAlign">Horizontal</label>
      <div class="align-group">
        <button class="align-btn active" data-align="left" onclick="setAlign('left')">&#9776;</button>
        <button class="align-btn" data-align="center" onclick="setAlign('center')">&#8801;</button>
        <button class="align-btn" data-align="right" onclick="setAlign('right')">&#9776;</button>
      </div>

        <label data-i18n="label.vAlign">Vertical</label>

          <button class="align-btn" data-valign="middle" onclick="setVAlign('middle')">↕</button>
          <button class="align-btn" data-valign="bottom" onclick="setVAlign('bottom')">↓</button>
        </div>
      </div>
    </div>
    <div>
      <div class="section-label" data-i18n="sec.color">Color</div>
      <label data-i18n="label.bgColor">Background</label>
      <div class="color-row">
        <div class="color-swatch" id="bgSwatch" style="background:#ffffff"><input type="color" id="bgColor" value="#ffffff"></div>
        <input type="text" class="color-hex" id="bgHex" value="#ffffff" maxlength="7">
      </div>
      <div style="margin-top:8px">
        <label data-i18n="label.fgColor">Text color</label>
        <div class="color-row">
          <div class="color-swatch" id="fgSwatch" style="background:#000000"><input type="color" id="fgColor" value="#000000"></div>
          <input type="text" class="color-hex" id="fgHex" value="#000000" maxlength="7">
        </div>

      <div style="margin-top:12px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0">
          <input type="checkbox" id="perCharCheck" style="width:auto;padding:0;accent-color:var(--accent)">
          <span data-i18n="label.perChar">Per-character color</span>
        </label>
      </div>
      <div id="perCharPanel" style="display:none;margin-top:8px">
        <div id="perCharList" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div style="margin-top:10px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-bottom:0">
          <input type="checkbox" id="gamingCheck" style="width:auto;padding:0;accent-color:var(--accent)">
          <span data-i18n="label.gaming">Gaming Text 🌈</span>
        </label>

    </div>
    <div>
      <div class="section-label" data-i18n="sec.padding">Padding</div>
      <label><span data-i18n="label.padding">Padding</span> <span id="paddingVal">40</span>px</label>
      <input type="range" id="padding" min="0" max="200" value="40">
    </div>
    <div>
      <div class="section-label" data-i18n="sec.size">Image size</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="setPreset(800,600)">800×600<br><span style="color:#666" data-i18n="preset.general">General</span></button>
        <button class="preset-btn" onclick="setPreset(1200,630)">1200×630<br><span style="color:#666">OGP</span></button>
        <button class="preset-btn" onclick="setPreset(1080,1080)">1080×1080<br><span style="color:#666" data-i18n="preset.square">Square</span></button>
        <button class="preset-btn" onclick="setPreset(1920,1080)">1920×1080<br><span style="color:#666">FHD</span></button>
        <button class="preset-btn" onclick="setPreset(1080,1920)">1080×1920<br><span style="color:#666" data-i18n="preset.portrait">Portrait</span></button>
        <button class="preset-btn" onclick="setPreset(1500,500)">1500×500<br><span style="color:#666" data-i18n="preset.wide">Wide</span></button>
      </div>
      <div class="row2" style="margin-top:8px">
        <div><label data-i18n="label.width">Width (px)</label><input type="number" id="imgWidth" value="800" min="1" max="4000"></div>
        <div><label data-i18n="label.height">Height (px)</label><input type="number" id="imgHeight" value="600" min="1" max="4000"></div>
      </div>
    </div>
    <hr class="divider">
    <div>
      <div class="section-label" data-i18n="sec.download">Download</div>
      <div class="dl-row">
        <select id="dlFormat" style="width:90px">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
        <button class="dl-btn" onclick="download()" data-i18n="btn.save">⬇ Save</button>
      </div>
    </div>
  </aside>
  <div class="preview-area" id="previewArea">
    <div class="canvas-wrapper" id="canvasWrapper"><canvas id="canvas"></canvas></div>
    <div class="size-indicator" id="sizeIndicator">800 × 600 px</div>
    <div class="zoom-hud">
      <button onclick="zoomStep(-1)">−</button>
      <span id="zoomLabel">100%</span>
      <button onclick="zoomStep(1)">＋</button>
      <button onclick="resetZoom()">⌖</button>
    </div>
    <div class="hint" id="hint" data-i18n="hint">Wheel / Pinch to zoom　Drag to pan</div>
  </div>
</div>
<script>
const STRINGS = {
  en: {
    'header.sub':'Text Image Generator',
    'sec.text':'Text','label.input':'Input',
    'sec.font':'Font','label.fontFamily':'Font family',
    'label.fontSize':'Size','label.lineHeight':'Line height',
    'sec.align':'Alignment','label.hAlign':'Horizontal','label.vAlign':'Vertical',
    'sec.color':'Color','label.bgColor':'Background','label.fgColor':'Text color',
    'sec.padding':'Padding','label.padding':'Padding',
    'sec.size':'Image size','label.width':'Width (px)','label.height':'Height (px)',
    'preset.general':'General','preset.square':'Square','preset.portrait':'Portrait','preset.wide':'Wide',
    'sec.download':'Download','btn.save':'⬇ Save',
    'hint':'Wheel / Pinch to zoom　Drag to pan',
    'placeholder':'Enter text here...',
    'label.perChar':'Per-character color',
    'label.gaming':'Gaming Text 🌈',
  },
  ja: {
    'header.sub':'テキスト画像ジェネレーター',
    'sec.text':'テキスト','label.input':'入力',
    'sec.font':'フォント','label.fontFamily':'フォント種類',
    'label.fontSize':'サイズ','label.lineHeight':'行間',
    'sec.align':'配置','label.hAlign':'水平','label.vAlign':'垂直',
    'sec.color':'カラー','label.bgColor':'背景色','label.fgColor':'文字色',
    'sec.padding':'余白','label.padding':'パディング',
    'sec.size':'画像サイズ','label.width':'幅 (px)','label.height':'高さ (px)',
    'preset.general':'汎用','preset.square':'正方形','preset.portrait':'縦長','preset.wide':'横長',
    'sec.download':'ダウンロード','btn.save':'⬇ 保存',
    'hint':'ホイール / ピンチ でズーム　ドラッグ でパン',
    'placeholder':'ここにテキストを入力...',
    'label.perChar':'文字ごとに色を指定',
    'label.gaming':'Gaming Text 🌈',
  }
};

const FONTS = [
  { v:"'Noto Sans JP', sans-serif", en:'Noto Sans JP (Gothic)',    ja:'Noto Sans JP（ゴシック）' },
  { v:"'Noto Serif JP', serif",     en:'Noto Serif JP (Mincho)',   ja:'Noto Serif JP（明朝）' },
  { v:"'M PLUS Rounded 1c', sans-serif", en:'M PLUS Rounded',     ja:'M PLUS Rounded（丸ゴシック）' },
  { v:"'Dela Gothic One', cursive", en:'Dela Gothic One',          ja:'Dela Gothic One（デコラティブ）' },
  { v:"'Zen Kaku Gothic New', sans-serif", en:'Zen Kaku Gothic New', ja:'Zen Kaku Gothic New' },
  { v:'serif',     en:'serif (system)', ja:'serif（システム）' },
  { v:'monospace', en:'monospace',      ja:'monospace' },
];

let lang = 'en';

function applyLang() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (STRINGS[lang][k]) el.textContent = STRINGS[lang][k];
  });
  document.getElementById('textInput').placeholder = STRINGS[lang]['placeholder'];
  document.getElementById('langBtn').textContent = lang === 'en' ? '日本語' : 'English';
  const sel = document.getElementById('fontFamily');
  const cur = sel.value;
  sel.innerHTML = FONTS.map(f => `<option value="${f.v}"${f.v===cur?' selected':''}>${f[lang]}</option>`).join('');
}

document.getElementById('langBtn').addEventListener('click', () => { lang = lang==='en'?'ja':'en'; applyLang(); });

// zoom/pan
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvasWrapper');
const previewArea = document.getElementById('previewArea');
let zoom=1, panX=0, panY=0;
const MIN_ZOOM=0.05, MAX_ZOOM=10;
setTimeout(()=>document.getElementById('hint').classList.add('hidden'),4000);

function applyTransform() {
  const r = previewArea.getBoundingClientRect();
  wrapper.style.left = r.width/2+panX+'px';
  wrapper.style.top  = r.height/2+panY+'px';
  wrapper.style.transform = `translate(-50%,-50%) scale(${zoom})`;
  document.getElementById('zoomLabel').textContent = Math.round(zoom*100)+'%';
}
function clampZoom(z){return Math.min(MAX_ZOOM,Math.max(MIN_ZOOM,z));}
function resetZoom(){zoom=1;panX=0;panY=0;applyTransform();}
function zoomStep(dir){
  const s=[0.1,0.15,0.25,0.33,0.5,0.67,0.75,1,1.25,1.5,2,2.5,3,4,5,6,8,10];
  if(dir>0){const n=s.find(v=>v>zoom+0.001);zoom=n||MAX_ZOOM;}
  else{const n=[...s].reverse().find(v=>v<zoom-0.001);zoom=n||MIN_ZOOM;}
  applyTransform();
}
previewArea.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=previewArea.getBoundingClientRect();
  const mx=e.clientX-r.left-r.width/2, my=e.clientY-r.top-r.height/2;
  const f=e.deltaY<0?1.1:1/1.1, nz=clampZoom(zoom*f), sc=nz/zoom;
  panX=mx+(panX-mx)*sc; panY=my+(panY-my)*sc; zoom=nz; applyTransform();
},{passive:false});
let dragging=false,dx=0,dy=0,px=0,py=0;
previewArea.addEventListener('mousedown',e=>{if(e.button!==0)return;dragging=true;dx=e.clientX;dy=e.clientY;px=panX;py=panY;});
window.addEventListener('mousemove',e=>{if(!dragging)return;panX=px+(e.clientX-dx);panY=py+(e.clientY-dy);applyTransform();});
window.addEventListener('mouseup',()=>{dragging=false;});
let lt=null;
previewArea.addEventListener('touchstart',e=>{e.preventDefault();lt=[...e.touches];},{passive:false});
previewArea.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=[...e.touches],r=previewArea.getBoundingClientRect(),cx=r.width/2,cy=r.height/2;
  if(t.length===1&&lt.length===1){panX+=t[0].clientX-lt[0].clientX;panY+=t[0].clientY-lt[0].clientY;}
  else if(t.length===2&&lt.length===2){
    const pd=Math.hypot(lt[1].clientX-lt[0].clientX,lt[1].clientY-lt[0].clientY);
    const cd=Math.hypot(t[1].clientX-t[0].clientX,t[1].clientY-t[0].clientY);
    const mx=(t[0].clientX+t[1].clientX)/2-r.left-cx, my=(t[0].clientY+t[1].clientY)/2-r.top-cy;
    const nz=clampZoom(zoom*cd/pd),sc=nz/zoom;
    panX=mx+(panX-mx)*sc;panY=my+(panY-my)*sc;zoom=nz;
    panX+=(t[0].clientX+t[1].clientX)/2-(lt[0].clientX+lt[1].clientX)/2;
    panY+=(t[0].clientY+t[1].clientY)/2-(lt[0].clientY+lt[1].clientY)/2;
  }
  lt=t; applyTransform();
},{passive:false});
previewArea.addEventListener('touchend',e=>{lt=[...e.touches];},{passive:false});

// canvas
let state={text:'Hello, World!',fontFamily:"'Noto Sans JP', sans-serif",fontSize:64,lineHeight:1.4,bold:false,italic:false,align:'left',valign:'top',bgColor:'#ffffff',fgColor:'#000000',padding:40,width:800,height:600,perChar:false,gaming:false,charColors:{}};

// gaming color: cycle through hue
function gamingColor(index, total) {
  const hue = Math.round((index / Math.max(total, 1)) * 360);
  return `hsl(${hue},100%,55%)`;
}

// build per-char color pickers
function buildPerCharList() {
  const list = document.getElementById('perCharList');
  const chars = [...state.text].filter(c => c !== '\n');
  const existing = state.charColors;
  const newColors = {};
  list.innerHTML = '';
  let idx = 0;
  [...state.text].forEach((c, ci) => {
    if (c === '\n') return;
    const color = existing[ci] || state.fgColor;
    newColors[ci] = color;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:2px';
    const lbl = document.createElement('span');
    lbl.textContent = c === ' ' ? '·' : c;
    lbl.style.cssText = 'font-size:10px;color:var(--muted);max-width:24px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
    const swatch = document.createElement('div');
    swatch.style.cssText = `width:24px;height:24px;border-radius:4px;border:1px solid var(--border);cursor:pointer;position:relative;overflow:hidden;background:${color}`;
    const inp = document.createElement('input');
    inp.type = 'color';
    inp.value = color;
    inp.style.cssText = 'opacity:0;position:absolute;inset:0;width:100%;height:100%;cursor:pointer;padding:0;border:none';
    const charIdx = ci;
    inp.addEventListener('input', e => {
      state.charColors[charIdx] = e.target.value;
      swatch.style.background = e.target.value;
      render();
    });
    swatch.appendChild(inp);
    wrap.appendChild(lbl);
    wrap.appendChild(swatch);
    list.appendChild(wrap);
    idx++;
  });
  state.charColors = newColors;
}

function render(){
  canvas.width=state.width; canvas.height=state.height;
  ctx.fillStyle=state.bgColor; ctx.fillRect(0,0,state.width,state.height);
  ctx.font=`${state.italic?'italic':'normal'} ${state.bold?'bold':'normal'} ${state.fontSize}px ${state.fontFamily}`;
  ctx.textBaseline='top';
  const lines=state.text.split('\n'), lineH=state.fontSize*state.lineHeight, pad=state.padding, totalH=lines.length*lineH;
  let sy=state.valign==='top'?pad:state.valign==='middle'?(state.height-totalH)/2:state.height-pad-totalH;

  // count total chars for gaming hue
  const allChars=[...state.text].filter(c=>c!=='\n');
  let globalCharIdx=0;

  lines.forEach((line,li)=>{
    // calc line x start
    const lineWidth=ctx.measureText(line).width;
    let lineX=state.align==='left'?pad:state.align==='center'?(state.width-lineWidth)/2:state.width-pad-lineWidth;
    const y=sy+li*lineH;

    if(!state.perChar && !state.gaming){
      ctx.fillStyle=state.fgColor;
      ctx.fillText(line,lineX,y,state.width-pad*2);
      globalCharIdx+=[...line].length;
    } else {
      // draw char by char
      let cx=lineX;
      // for center/right we need to position correctly: already set lineX as start
      [...line].forEach((ch,ci)=>{
        const charW=ctx.measureText(ch).width;
        let color;
        if(state.gaming){
          color=gamingColor(globalCharIdx, allChars.length);
        } else {
          // find original index in state.text
          const origIdx=[...state.text].findIndex((c,i)=>{
            let g=0;
            for(let j=0;j<i;j++) if(state.text[j]!=='\n') g++;
            return c!=='\n' && g===globalCharIdx;
          });
          color=state.charColors[origIdx] || state.fgColor;
        }
        ctx.fillStyle=color;
        ctx.fillText(ch,cx,y);
        cx+=charW;
        globalCharIdx++;
      });
    }
  });

  document.getElementById('sizeIndicator').textContent=`${state.width} × ${state.height} px`;
  applyTransform();
}

document.getElementById('textInput').addEventListener('input',e=>{
  state.text=e.target.value;
  if(state.perChar) buildPerCharList();
  render();
});
document.getElementById('fontFamily').addEventListener('change',e=>{state.fontFamily=e.target.value;render();});
document.getElementById('fontSize').addEventListener('input',e=>{state.fontSize=+e.target.value;document.getElementById('fontSizeVal').textContent=e.target.value;render();});
document.getElementById('lineHeight').addEventListener('input',e=>{state.lineHeight=+e.target.value;document.getElementById('lineHeightVal').textContent=(+e.target.value).toFixed(1);render();});
document.getElementById('padding').addEventListener('input',e=>{state.padding=+e.target.value;document.getElementById('paddingVal').textContent=e.target.value;render();});
document.getElementById('imgWidth').addEventListener('change',e=>{state.width=+e.target.value||800;render();});
document.getElementById('imgHeight').addEventListener('change',e=>{state.height=+e.target.value||600;render();});

function syncColor(cid,hid,sid,key){
  const p=document.getElementById(cid),h=document.getElementById(hid),s=document.getElementById(sid);
  p.addEventListener('input',e=>{state[key]=e.target.value;h.value=e.target.value;s.style.background=e.target.value;render();});
  h.addEventListener('change',e=>{if(/^#[0-9a-fA-F]{6}$/.test(e.target.value)){state[key]=e.target.value;p.value=e.target.value;s.style.background=e.target.value;render();}});
}
syncColor('bgColor','bgHex','bgSwatch','bgColor');
syncColor('fgColor','fgHex','fgSwatch','fgColor');

function setAlign(a){state.align=a;document.querySelectorAll('[data-align]').forEach(b=>b.classList.toggle('active',b.dataset.align===a));render();}
function setVAlign(v){state.valign=v;document.querySelectorAll('[data-valign]').forEach(b=>b.classList.toggle('active',b.dataset.valign===v));render();}
function toggleBold(){state.bold=!state.bold;document.getElementById('boldBtn').classList.toggle('active',state.bold);render();}
function toggleItalic(){state.italic=!state.italic;document.getElementById('italicBtn').classList.toggle('active',state.italic);render();}
function setPreset(w,h){state.width=w;state.height=h;document.getElementById('imgWidth').value=w;document.getElementById('imgHeight').value=h;render();}

document.getElementById('perCharCheck').addEventListener('change',e=>{
  state.perChar=e.target.checked;
  const panel=document.getElementById('perCharPanel');
  if(state.perChar){
    state.gaming=false;
    document.getElementById('gamingCheck').checked=false;
    buildPerCharList();
    panel.style.display='block';
  } else {
    panel.style.display='none';
  }
  render();
});

document.getElementById('gamingCheck').addEventListener('change',e=>{
  state.gaming=e.target.checked;
  if(state.gaming){
    state.perChar=false;
    document.getElementById('perCharCheck').checked=false;
    document.getElementById('perCharPanel').style.display='none';
  }
  render();
});
function download(){
  const fmt=document.getElementById('dlFormat').value;
  const mime=fmt==='jpeg'?'image/jpeg':fmt==='webp'?'image/webp':'image/png';
  const a=document.createElement('a');a.href=canvas.toDataURL(mime,0.95);a.download=`textimg.${fmt}`;a.click();
}

applyLang();
render();
setTimeout(()=>{
  const r=previewArea.getBoundingClientRect();
  zoom=clampZoom(Math.min((r.width-80)/state.width,(r.height-80)/state.height,1));
  applyTransform();
},100);
</script>
</body>
</html>
